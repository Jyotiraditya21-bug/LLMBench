name: AI Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    name: Run LLM Regression Suite
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install CI Runner Requirements
      run: |
        python -m pip install --upgrade pip
        pip install requests -r backend/requirements.txt

    - name: Start Redis Server
      run: |
        sudo service redis-server start || true
        sleep 1

    - name: Seed Database (SQLite)
      env:
        USE_SQLITE: "true"
      run: |
        PYTHONPATH=. python backend/app/core/seed_db.py

    - name: Start FastAPI Backend in background
      env:
        USE_SQLITE: "true"
      run: |
        PYTHONPATH=. python -m uvicorn backend.app.main:app --port 8000 &
        sleep 3

    - name: Start Celery Worker in background
      env:
        USE_SQLITE: "true"
      run: |
        PYTHONPATH=. celery -A backend.app.core.celery_app worker --pool=solo --loglevel=info &
        sleep 2

    - name: Run Quality Gate Regression Test
      env:
        EVALFORGE_BACKEND_URL: http://localhost:8000/api/v1
        EVALFORGE_API_KEY: evalforge_admin_secret_key
        EVALFORGE_DATASET_ID: 1
        EVALFORGE_BASELINE_RUN_ID: 1
        EVALFORGE_PROMPT_ID: 1
        EVALFORGE_MODELS: claude-3-haiku
        USE_SQLITE: "true"
      run: |
        PYTHONPATH=. python backend/app/workers/quality_gate.py

    - name: Compile Static HTML Report
      env:
        USE_SQLITE: "true"
      run: |
        PYTHONPATH=. python backend/app/workers/report_generator.py

    - name: Deploy static report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
